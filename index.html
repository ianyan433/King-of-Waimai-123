<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百万撤离</title>
<style>
    /* 全局与手机外壳样式 */
    body { background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
    #phone { width: 375px; height: 750px; background: #000; border-radius: 40px; border: 12px solid #333; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .screen { width: 100%; height: 100%; background: #f4f4f4; position: absolute; top: 0; left: 0; display: none; flex-direction: column; }
    .active { display: flex; }
    
    /* 顶部状态栏 */
    .status-bar { height: 30px; background: rgba(255,255,255,0.9); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 12px; font-weight: bold; z-index: 100; border-bottom: 1px solid #ddd; }
    
    /* 桌面图标 */
    #home-screen { background: url('https://img.freepik.com/free-vector/sky-clouds-anime-style-background_52683-60515.jpg') no-repeat center center; background-size: cover; padding-top: 50px; flex-direction: row; flex-wrap: wrap; align-content: flex-start; gap: 20px; padding-left: 25px; }
    .app-icon { width: 60px; height: 60px; border-radius: 15px; display: flex; justify-content: center; align-items: center; color: white; font-size: 12px; text-align: center; cursor: pointer; flex-direction: column; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: transform 0.1s; }
    .app-icon:active { transform: scale(0.95); }
    .app-waimai { background: linear-gradient(135deg, #ff9900, #ff5500); }
    .app-chat { background: linear-gradient(135deg, #00c6ff, #0072ff); }
    .app-bank { background: linear-gradient(135deg, #e52d27, #b31217); }
    .icon-label { margin-top: 5px; color: #fff; text-shadow: 1px 1px 2px #000; font-size: 13px; }

    /* 通用APP头部 */
    .app-header { height: 50px; background: #fff; display: flex; align-items: center; padding: 0 15px; font-size: 18px; font-weight: bold; border-bottom: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .back-btn { margin-right: 15px; cursor: pointer; font-size: 20px; color: #666; }

    /* 外卖APP专属 */
    .dashboard { display: flex; justify-content: space-between; padding: 15px; background: #fff; margin-bottom: 10px; border-bottom: 1px solid #ddd; font-size: 14px; }
    .stat-item { text-align: center; }
    .stat-val { font-size: 18px; font-weight: bold; color: #ff5500; }
    .order-card { background: #fff; margin: 15px; border-radius: 10px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .order-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
    .order-detail { font-size: 14px; color: #555; margin-bottom: 5px; }
    .order-note { font-size: 13px; color: #e74c3c; background: #fadbd8; padding: 5px; border-radius: 5px; margin-bottom: 15px; border-left: 3px solid #e74c3c; }
    .order-reward { font-size: 20px; font-weight: bold; color: #27ae60; text-align: center; margin-bottom: 15px; }
    .action-btns { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: background 0.2s; }
    .btn-reject { background: #95a5a6; }
    .btn-reject:active { background: #7f8c8d; }
    .btn-accept { background: #ff5500; }
    .btn-accept:active { background: #e64d00; }
    
    /* 弹窗与高亮特效 */
    .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: white; width: 85%; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 0 25px #ff5500; animation: popIn 0.3s ease; }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .event-title { color: #e74c3c; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
    .event-desc { font-size: 16px; margin-bottom: 20px; color: #333; line-height: 1.5; }
    .event-effect { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 20px; font-size: 18px; }
    .pos { color: #27ae60; } .neg { color: #e74c3c; }
    
    /* 聊天和银行APP */
    .chat-bubble { background: #fff; margin: 15px; padding: 15px; border-radius: 15px; border-top-left-radius: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .chat-bubble.mine { background: #dcf8c6; border-radius: 15px; border-top-right-radius: 0; margin-left: 50px; text-align: right; }
    .bank-card { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; margin: 20px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    
    /* 成就列表 */
    .achieve-list { max-height: 400px; overflow-y: auto; text-align: left; }
    .achieve-item { padding: 10px; border-bottom: 1px solid #eee; }
    .achieve-name { font-weight: bold; color: #ff5500; }
</style>
</head>
<body>

<div id="phone">
    <div class="status-bar">
        <span id="clock">08:00</span>

    </div>

    <div id="home-screen" class="screen active">
        <div style="width:100%; height:20px;"></div>
        <div>
            <div class="app-icon app-waimai" onclick="openApp('delivery-app')">饿</div>

            <div class="chat-bubble mine">放心！我辞职送外卖了，听说现在跑腿特别赚钱，这个月我拼了命也给你凑够100万！等我！</div>
        </div>

    <div id="bank-app" class="screen">

        </div>
        <div class="bank-card">
            <div style="font-size:14px; opacity:0.8; margin-bottom:10px;">总资产 (元)</div>
            <div style="font-size:36px; font-weight:bold;" id="bank-money">0.00</div>
            <div style="margin-top:20px; font-size:12px;">目标：1,000,000 元</div>

    </div>

    <div id="delivery-app" class="screen">
        <div class="app-header">
            <span class="back-btn" onclick="openApp('home-screen')">←</span>
            饿死么 - 骑手端
        </div>
        <div class="dashboard">
            <div class="stat-item">
                <div>日期</div>
                <div class="stat-val">第 <span id="ui-day">1</span> 天</div>
            </div>
            <div class="stat-item">
                <div>今日体力</div>
                <div class="stat-val"><span id="ui-stamina">100</span>/100</div>
            </div>
            <div class="stat-item">
                <div>剩余单量</div>
                <div class="stat-val"><span id="ui-orders">10</span> 单</div>
            </div>
        </div>
        
        <div id="order-container">
            </div>
    </div>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="event-title">⚠️ 突发事件！</div>
            <div id="event-desc" class="event-desc">描述内容</div>
            <div class="event-effect">
                <span id="event-money-effect"></span>
                <span id="event-stamina-effect"></span>
            </div>
            <button class="btn btn-accept" style="width:100%" onclick="closeEvent()">确认</button>
        </div>
    </div>

    <div id="end-modal" class="modal-overlay">
        <div class="modal-content" style="max-height: 90%; overflow-y:auto;">
            <div class="event-title" id="end-title">游戏结束</div>
            <div class="event-desc" id="end-desc"></div>
            <h3 style="text-align:left; margin-top:15px; color:#ff5500;">🏆 达成成就：</h3>
            <div class="achieve-list" id="achieve-list"></div>
            <button class="btn btn-accept" style="width:100%; margin-top:20px;" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

</div>

<script>
// --- 游戏数据 ---
let day = 1;
let money = 0;
let stamina = 100;
let actionsLeft = 10;
let currentOrder = null;

// 统计数据 (用于成就)
let stats = {
    totalOrders: 0,
    rejectedOrders: 0,
    goodEvents: 0,
    badEvents: 0,
    zeroStaminaOrders: 0
};

// 50个精心设计的特殊事件 (小概率触发)
const events = [
    // 正面事件 (+钱)
    { t: "王多鱼点餐，见你送得快，顺手塞了一沓小费！", m: 20000, s: 0, type: "good" },

    { t: "帮神秘土豪代买限量版劳力士，打赏巨款！", m: 30000, s: -10, type: "good" },
    { t: "客户是个大网红，正在直播，一高兴给你刷了火箭折现！", m: 18000, s: 0, type: "good" },
    { t: "送餐到剧组，顺便客串了一个群演，片酬到手。", m: 8000, s: -15, type: "good" },
    { t: "帮程序员修好了Bug，他激动地转了你一笔奖金。", m: 12000, s: 0, type: "good" },
    { t: "买彩票中了二等奖，运气爆棚！", m: 50000, s: 0, type: "good" },
    { t: "帮独居大妈换灯泡，大妈送了你祖传玉镯（已变现）！", m: 40000, s: 0, type: "good" },
    { t: "送到证券公司，听到内幕消息顺手买股票赚了！", m: 25000, s: 0, type: "good" },
    { t: "在路边救助了一只名贵宠物狗，主人悬赏兑现。", m: 20000, s: 0, type: "good" },
    { t: "雨天送餐感动了客户，给你发了超大红包。", m: 10000, s: 0, type: "good" },
    // 负面事件 (-钱)
    { t: "闯红灯被交警逮个正着，罚款并教育半小时！", m: -2000, s: -10, type: "bad" },
    { t: "外卖不小心撒了，赔偿了客户餐损。", m: -3000, s: 0, type: "bad" },
    { t: "违停被贴条，白干大半天！", m: -5000, s: 0, type: "bad" },
    { t: "车胎扎了钉子，去修车花了一大笔钱。", m: -1500, s: -20, type: "bad" },
    { t: "被客户恶意差评，系统扣除了高额保证金！", m: -4000, s: 0, type: "bad" },
    { t: "遇到碰瓷的大爷，无奈破财消灾。", m: -10000, s: 0, type: "bad" },
    { t: "送餐太急手机摔碎了屏，换屏大出血。", m: -8000, s: 0, type: "bad" },
    { t: "遭遇电信诈骗，被骗走了一部分存款！", m: -15000, s: 0, type: "bad" },
    { t: "电瓶被偷了！只能咬牙买个新的。", m: -12000, s: 0, type: "bad" },
    { t: "买路边摊吃坏肚子，去医院打点滴花钱。", m: -2000, s: -30, type: "bad" },
    // 正面事件 (+体力)
    { t: "客户看你太累，送了你一杯霸王茶姬！", m: 0, s: 30, type: "good" },
    { t: "路过按摩店搞免费体验活动，进去按了十分钟，神清气爽！", m: 0, s: 40, type: "good" },
    { t: "遇到热心食堂大妈，免费请你吃了一顿豪华鸡腿饭。", m: 0, s: 35, type: "good" },
    { t: "在小公园长椅上偷懒睡了一觉，体力大增。", m: 0, s: 25, type: "good" },
    { t: "今天微风不燥，骑车感觉特别顺畅，一点都不累。", m: 0, s: 20, type: "good" },
    { t: "好心人送了你一瓶冰镇红牛，满血复活！", m: 0, s: 45, type: "good" },
    { t: "电梯很空，不需要爬楼，节省了大量体力。", m: 0, s: 15, type: "good" },
    { t: "喝了客户送的神秘药水，浑身充满力量！", m: 0, s: 50, type: "good" },
    { t: "遇到前女友，为了面子强行精神焕发！", m: 0, s: 30, type: "good" },
    { t: "听着劲爆DJ舞曲送餐，越送越带劲！", m: 0, s: 25, type: "good" },
    // 负面事件 (-体力)
    { t: "电梯坏了，一口气爬了25层楼，累成狗！", m: 0, s: -40, type: "bad" },
    { t: "小区保安不让电动车进，提着重物走了两公里。", m: 0, s: -35, type: "bad" },
    { t: "遇到狂风暴雨，顶风骑车极度消耗体力。", m: 0, s: -30, type: "bad" },
    { t: "走错单元楼，来回折腾找路，腿都废了。", m: 0, s: -25, type: "bad" },
    { t: "被小区里的大黄狗追了三条街，体力透支！", m: 0, s: -45, type: "bad" },
    { t: "送水单，扛着两大桶农夫山泉上6楼。", m: 0, s: -40, type: "bad" },
    { t: "迷路进了一个像八卦阵一样的老小区，心力交瘁。", m: 0, s: -20, type: "bad" },
    { t: "今天太阳太毒，中暑边缘疯狂试探。", m: 0, s: -30, type: "bad" },
    { t: "帮客户倒垃圾，结果垃圾袋破了洒一地，清理了半天。", m: 0, s: -25, type: "bad" },
    { t: "遇到前女友和现任，心情极度低落，感到身心俱疲。", m: 0, s: -35, type: "bad" },
    // 混合/脑洞事件
    { t: "帮抓小偷，获得了见义勇为奖金，但受了点轻伤。", m: 20000, s: -40, type: "good" },
    { t: "客户要你大喊‘公主请用餐’，你照做了，获得了小费但心力交瘁。", m: 5000, s: -20, type: "good" },
    { t: "误入剧本杀片场当了NPC，赚了外快但跑断了腿。", m: 8000, s: -30, type: "good" },
    { t: "代替土豪去排队买AJ，排了5个小时赚翻了！", m: 15000, s: -50, type: "good" },
    { t: "送餐送到豪宅，陪老板下了一盘象棋赢了钱，但很费脑子。", m: 10000, s: -15, type: "good" },
    { t: "路过网吧没忍住进去上了一会网，花钱还熬了夜。", m: -1000, s: -20, type: "bad" },
    { t: "喂流浪猫花钱买了罐头，看着它吃完，虽然破财但心情大好！", m: -500, s: 20, type: "good" },
    { t: "在寺庙送单顺便拜了佛，捐了香火钱，感觉神灵庇护体力充沛。", m: -2000, s: 40, type: "good" },
    { t: "送急件到机场，狂奔赶上了飞机起飞前，累瘫但小费惊人。", m: 25000, s: -60, type: "good" },
    { t: "卷入帮派纠纷，送了一箱‘面粉’，吓得半死结果是真面粉，雇主给了封口费。", m: 35000, s: -50, type: "good" }
];

// --- 游戏逻辑 ---

// 生成一个随机订单 (要凑够100万，每次奖励必须夸张，均价约3500)
function generateOrder() {
    const foods = ["法式鹅肝配拉菲", "成箱的金条(代送)", "机密文件(加急)", "黑钻鱼子酱", "十杯霸王茶姬", "满汉全席外卖版", "一卡车鲜花", "顶级劳力士(代买)"];
    const notes = ["搞快点，等着用呢！", "不要敲门，偷偷放在门口", "送到请对暗号：天王盖地虎", "多加点辣，越辣越好", "帮我画个小老虎在袋子上", "急急急，加钱！"];
    
    // 基础价格 1000 - 5000
    let baseMoney = Math.floor(Math.random() * 4000) + 1000;
    let baseStamina = Math.floor(Math.random() * 20) + 10;
    
    // 10%概率出现极品大单
    if (Math.random() < 0.1) {
        baseMoney = Math.floor(Math.random() * 15000) + 10000;
        baseStamina = Math.floor(Math.random() * 30) + 20; 
    }

    currentOrder = {
        title: "大订单来了！",
        food: foods[Math.floor(Math.random() * foods.length)] + " x" + (Math.floor(Math.random() * 5) + 1),
        note: notes[Math.floor(Math.random() * notes.length)],
        reward: baseMoney,
        cost: baseStamina
    };
    renderOrder();
}

function renderOrder() {
    const container = document.getElementById('order-container');
    container.innerHTML = `
        <div class="order-card">
            <div class="order-title">🛵 ${currentOrder.title}</div>
            <div class="order-detail">📦 餐品：${currentOrder.food}</div>
            <div class="order-detail">⚡ 消耗体力：${currentOrder.cost} 点</div>
            <div class="order-note">📝 客户备注：${currentOrder.note}</div>
            <div class="order-reward">预计收入: +￥${currentOrder.reward}</div>
            <div class="action-btns">
                <button class="btn btn-reject" onclick="handleOrder(false)">不接 (回血)</button>
                <button class="btn btn-accept" onclick="handleOrder(true)">接单！</button>
            </div>
        </div>
    `;
}

function handleOrder(isAccept) {
    if (isAccept) {
        if (stamina < currentOrder.cost) {
            alert("体力不足！强行接单会累倒的，拒单一单恢复体力吧！");
            return;
        }
        // 接单逻辑
        stamina -= currentOrder.cost;
        if(stamina <= 0) stats.zeroStaminaOrders++; // 记录硬抗订单
        
        let earn = currentOrder.reward;
        stats.totalOrders++;
        
        // 30% 概率触发突发事件
        if (Math.random() < 0.3) {
            triggerEvent();
        } else {
            money += earn;
            showFloatText(`接单成功赚取 ￥${earn}`);
            nextAction();
        }
    } else {
        // 拒单逻辑 (恢复体力，不赚钱，消耗一次行动机会)
        let recover = Math.floor(Math.random() * 15) + 15; // 恢复15-30体力
        stamina += recover;
        if (stamina > 100) stamina = 100;
        stats.rejectedOrders++;
        showFloatText(`休息了一下，恢复了 ${recover} 点体力`);
        nextAction();
    }
}

function showFloatText(text) {
    // 简易提示
    const tip = document.createElement('div');
    tip.innerText = text;
    tip.style.position = 'fixed';
    tip.style.top = '50%';
    tip.style.left = '50%';
    tip.style.transform = 'translate(-50%, -50%)';
    tip.style.background = 'rgba(0,0,0,0.8)';
    tip.style.color = 'white';
    tip.style.padding = '10px 20px';
    tip.style.borderRadius = '20px';
    tip.style.zIndex = '9999';
    document.body.appendChild(tip);
    setTimeout(() => tip.remove(), 1500);
}

function triggerEvent() {
    const ev = events[Math.floor(Math.random() * events.length)];
    
    // 应用效果
    money += ev.m;
    stamina += ev.s;
    money = money < 0 ? 0 : money; // 钱不能为负
    stamina = stamina > 100 ? 100 : stamina;
    
    if(ev.type === 'good') stats.goodEvents++;
    if(ev.type === 'bad') stats.badEvents++;

    // 渲染弹窗
    document.getElementById('event-desc').innerText = ev.t;
    
    const mEffect = document.getElementById('event-money-effect');
    if (ev.m !== 0) {
        mEffect.innerText = ev.m > 0 ? `💰 +￥${ev.m}` : `💰 -￥${Math.abs(ev.m)}`;
        mEffect.className = ev.m > 0 ? 'pos' : 'neg';
    } else { mEffect.innerText = ''; }

    const sEffect = document.getElementById('event-stamina-effect');
    if (ev.s !== 0) {
        sEffect.innerText = ev.s > 0 ? `⚡ +${ev.s}体力` : `⚡ ${ev.s}体力`;
        sEffect.className = ev.s > 0 ? 'pos' : 'neg';
    } else { sEffect.innerText = ''; }

    document.getElementById('event-modal').style.display = 'flex';
}

function closeEvent() {
    document.getElementById('event-modal').style.display = 'none';
    // 加上正常接单的钱 (事件是额外发生的)
    money += currentOrder.reward; 
    nextAction();
}

function nextAction() {
    actionsLeft--;
    updateUI();
    
    if (actionsLeft <= 0) {
        endDay();
    } else {
        generateOrder();
    }
}

function endDay() {
    day++;
    if (day > 30) {
        endGame();
    } else {
        alert(`第 ${day-1} 天结束，拖着疲惫的身躯睡了一觉。体力恢复到100！\n当前存款：￥${money}`);
        stamina = 100;
        actionsLeft = 10;
        updateUI();
        generateOrder();
    }
}

function updateUI() {
    document.getElementById('ui-day').innerText = day > 30 ? 30 : day;
    document.getElementById('ui-stamina').innerText = stamina;
    document.getElementById('ui-orders').innerText = actionsLeft;
    document.getElementById('bank-money').innerText = money.toLocaleString();
}

function openApp(appId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(appId).classList.add('active');
    if(appId === 'delivery-app' && day === 1 && actionsLeft === 10 && currentOrder === null){
        generateOrder(); // 首次进入生成订单
    }
}

// --- 成就与结算 ---
function endGame() {
    const endModal = document.getElementById('end-modal');
    const title = document.getElementById('end-title');
    const desc = document.getElementById('end-desc');
    const list = document.getElementById('achieve-list');
    
    let isWin = money >= 1000000;
    if (isWin) {
        title.innerText = "🎉 迎娶白富美！";
        desc.innerText = `太强了！你用30天狂赚了 ￥${money.toLocaleString()}！翠花感动得痛哭流涕，丈母娘直接给你倒茶。你成功走上了人生巅峰！`;
    } else {
        title.innerText = "😭 遗憾离场";
        desc.innerText = `很遗憾，30天你只赚了 ￥${money.toLocaleString()}，距离100万的目标还差得远。翠花昨天已经坐上了村头王大拿的宝马车...`;
    }

    // 结算成就
    const achievements = [
        { name: "肝帝", cond: true, desc: "完整玩完了一局游戏。" },
        { name: "人生赢家", cond: isWin, desc: "赚到100万，成功娶到媳妇！" },
        { name: "单车变摩托", cond: money >= 500000 && !isWin, desc: "存款达到50万，虽然没娶到媳妇但也不亏。" },
        { name: "天选打工人", cond: stats.totalOrders >= 180, desc: "累计完成 180 单以上，劳模！" },
        { name: "摸鱼达人", cond: stats.rejectedOrders >= 50, desc: "累计拒单 50 次，带薪拉屎第一人。" },
        { name: "欧皇附体", cond: stats.goodEvents >= 10, desc: "遇到10次以上正面突发事件。" },
        { name: "倒霉透顶", cond: stats.badEvents >= 10, desc: "遇到10次以上负面突发事件，去拜拜佛吧。" },
        { name: "钢铁之躯", cond: stats.zeroStaminaOrders > 0, desc: "体力不足依然硬抗完成订单，太拼了！" },
        { name: "穷光蛋", cond: money < 10000, desc: "忙活一个月，连一万块都没赚到..." }
    ];

    let achieveHTML = "";
    achievements.forEach(a => {
        if (a.cond) {
            achieveHTML += `<div class="achieve-item"><span class="achieve-name">🏆【${a.name}】</span>: ${a.desc}</div>`;
        }
    });
    list.innerHTML = achieveHTML;

    endModal.style.display = 'flex';
}

// 初始化时钟动效 (装饰用)
setInterval(() => {
    let now = new Date();
    document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
}, 1000);

</script>
